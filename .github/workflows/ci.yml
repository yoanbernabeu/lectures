name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Valider les données (books.json)
        run: npm run validate

      - name: Vérifier types et templates
        run: npx astro check

      - name: Builder le site
        run: npm run build
